<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGPT — Resume Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --black: #0a0a0a;
            --white: #f5f3ee;
            --accent: #c8f74a;
            --accent2: #ff5c3a;
            --gray: #6b6b6b;
            --card-bg: #111111;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            padding: 7rem 2rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
            color: var(--white);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }
        .nav-tag {
            font-size: 0.75rem;
            color: var(--gray);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 999px;
        }

        .container {
            width: 100%;
            max-width: 780px;
        }
        .header {
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 0.7s ease forwards 0.1s;
        }
        .eyebrow {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .eyebrow::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: var(--gray);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .analysis-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.7s ease forwards 0.3s;
            position: relative;
            overflow: hidden;
        }
        .analysis-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }
        .analysis-text {
            font-size: 0.95rem;
            line-height: 1.9;
            color: rgba(245, 243, 238, 0.8);
            font-weight: 300;
            white-space: pre-wrap;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        .analysis-text::-webkit-scrollbar { width: 4px; }
        .analysis-text::-webkit-scrollbar-track { background: transparent; }
        .analysis-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }

        .actions {
            display: flex;
            gap: 1rem;
            opacity: 0;
            animation: fadeUp 0.7s ease forwards 0.5s;
        }
        .btn {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary {
            background: var(--accent);
            color: var(--black);
        }
        .btn-primary:hover { box-shadow: 0 8px 24px rgba(200, 247, 74, 0.25); }
        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { border-color: rgba(255,255,255,0.35); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @media (max-width: 600px) {
            nav { padding: 1.2rem 1.5rem; }
            .actions { flex-direction: column; }
            .analysis-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Career<span>GPT</span></a>
        <div class="nav-tag">Analysis Complete ✦</div>
    </nav>

    <div class="container">
        <div class="header">
            <div class="eyebrow">Resume Analysis</div>
            <h1>Here's the<br>honest truth.</h1>
            <p class="subtitle">AI-powered breakdown of your resume — no sugarcoating.</p>
        </div>

        <div class="analysis-card">
            <pre class="analysis-text">{{ resume_analysis }}</pre>
        </div>

        <div class="actions">
            <a href="/ask" class="btn btn-primary">Ask a Question →</a>
            <a href="/" class="btn btn-secondary">← Upload New Resume</a>
        </div>
    </div>
</body>
</html>
