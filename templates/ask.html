<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGPT — Ask a Question</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --black: #0a0a0a;
            --white: #f5f3ee;
            --accent: #c8f74a;
            --gray: #6b6b6b;
            --card-bg: #111111;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
            color: var(--white);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }
        .nav-back {
            font-size: 0.8rem;
            color: var(--gray);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            transition: color 0.2s, border-color 0.2s;
        }
        .nav-back:hover { color: var(--white); border-color: rgba(255,255,255,0.3); }

        .container {
            width: 100%;
            max-width: 560px;
            opacity: 0;
            transform: translateY(24px);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }
        .eyebrow {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2.8rem;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.75rem;
        }
        .subtitle {
            color: var(--gray);
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 2.5rem;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 2rem;
        }
        .input-wrapper {
            position: relative;
            margin-bottom: 1.2rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 1rem 3rem 1rem 1.2rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]::placeholder { color: var(--gray); }
        input[type="text"]:focus { border-color: var(--accent); }
        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: var(--black);
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(200, 247, 74, 0.25);
        }
        .hint {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--gray);
            text-align: center;
            line-height: 1.6;
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            nav { padding: 1.2rem 1.5rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Career<span>GPT</span></a>
        <a href="/" class="nav-back">← Back to Home</a>
    </nav>

    <div class="container">
        <div class="eyebrow">✦ Career Q&A</div>
        <h1>Ask me<br>anything.</h1>
        <p class="subtitle">Your resume is loaded. Ask about your skills, career gaps, job fit — anything.</p>

        <div class="card">
            <form action="/ask" method="POST">
                <div class="input-wrapper">
                    <input type="text" name="query" placeholder="e.g. What are my strongest skills?" required>
                    <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                    </svg>
                </div>
                <button type="submit" class="submit-btn">Get Answer →</button>
            </form>
        </div>

        <p class="hint">Try: "What jobs should I apply for?" or "How can I improve my resume?"</p>
    </div>
</body>
</html>
