<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGPT — Query Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --black: #0a0a0a;
            --white: #f5f3ee;
            --accent: #c8f74a;
            --gray: #6b6b6b;
            --card-bg: #111111;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem 3rem;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
            color: var(--white);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }
        .nav-back {
            font-size: 0.8rem;
            color: var(--gray);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            transition: color 0.2s, border-color 0.2s;
        }
        .nav-back:hover { color: var(--white); border-color: rgba(255,255,255,0.3); }

        .container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .eyebrow {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.1s;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.2s;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.8rem;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.45s; }
        .card-label {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-label::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
        }
        .query-card .card-label::before { background: var(--gray); }
        .card-text {
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(245, 243, 238, 0.85);
            font-weight: 300;
        }
        .answer-card {
            border-color: rgba(200, 247, 74, 0.15);
            background: linear-gradient(135deg, rgba(200, 247, 74, 0.05), rgba(200, 247, 74, 0.01));
        }
        .actions {
            display: flex;
            gap: 1rem;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.6s;
        }
        .btn {
            flex: 1;
            padding: 0.9rem 1.5rem;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary {
            background: var(--accent);
            color: var(--black);
        }
        .btn-primary:hover { box-shadow: 0 8px 24px rgba(200, 247, 74, 0.25); }
        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { border-color: rgba(255,255,255,0.35); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            nav { padding: 1.2rem 1.5rem; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Career<span>GPT</span></a>
        <a href="/" class="nav-back">← Home</a>
    </nav>

    <div class="container">
        <div class="eyebrow">✦ Query Result</div>
        <h1>Here's your answer.</h1>

        <div class="card query-card">
            <div class="card-label">Your Query</div>
            <p class="card-text">{{ query }}</p>
        </div>

        <div class="card answer-card">
            <div class="card-label">CareerGPT Answer</div>
            <p class="card-text">{{ answer }}</p>
        </div>

        <div class="actions">
            <a href="/ask" class="btn btn-primary">Ask Another →</a>
            <a href="/" class="btn btn-secondary">← Home</a>
        </div>
    </div>
</body>
</html>
